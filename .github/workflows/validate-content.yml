name: Validate archive contribution
on:
  pull_request:
    paths:
      - 'content/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run build
