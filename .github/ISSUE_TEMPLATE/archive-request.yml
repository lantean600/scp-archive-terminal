name: 档案建议
description: 提议一个新的 SCP 档案或改进现有档案
title: "[Archive] "
labels: [archive]
body:
  - type: input
    id: title
    attributes:
      label: 档案标题
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 档案概念
      description: 简述异常特性、收容方向和希望加入的内容。
    validations:
      required: true
